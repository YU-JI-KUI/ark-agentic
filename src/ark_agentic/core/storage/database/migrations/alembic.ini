[alembic]
# Resolve env.py + versions/ relative to this ini file's directory.
script_location = %(here)s

# Q2=B: YYYYMMDD_<rev>_<slug>.py — sortable by file name == sortable by date.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Default URL for developer ``alembic revision --autogenerate`` runs against
# a throwaway sqlite file. Production / CI never reads this — the helper
# injects a live connection via ``cfg.attributes`` instead.
sqlalchemy.url = sqlite+aiosqlite:///data/ark_dev.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
