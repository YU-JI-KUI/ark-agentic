[project]
name = "ark-agentic"
version = "0.1.0"
description = "Lightweight ReAct agent framework"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27.0",
    "pyyaml>=6.0.0",
    "python-dotenv>=1.0.0",
    "numpy>=2.0.0",
    "langchain-openai>=0.3",
    "langchain-core>=0.3",
]

[project.optional-dependencies]
server = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
]
dev = [
    "ark-agentic[server]",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
]
pa-jt = [
    "pycryptodome>=3.20.0",
]
memory = [
    "faiss-cpu>=1.9.0",
    "jieba>=0.42.1",
    "sentence-transformers>=3.3.0",
]
all = [
    "ark-agentic[dev,pa-jt,memory]",
]

[project.scripts]
ark-agentic = "ark_agentic.cli.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ark_agentic"]
exclude = [
    "src/ark_agentic/agents",
    "src/ark_agentic/app.py",
    "src/ark_agentic/static",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.pyright]
extraPaths = ["src"]

[dependency-groups]
dev = [
    "flake8>=7.3.0",
    "mypy>=1.19.1",
    "twine>=6.0.0"
]
