[project]
name = "ark-agentic"
version = "0.1.0"
description = "Lightweight ReAct agent framework"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27.0",
    "pyyaml>=6.0.0",
    "python-dotenv>=1.0.0",
    "numpy>=2.0.0",
    "faiss-cpu>=1.9.0",
    "jieba>=0.42.1",
    "sentence-transformers>=3.3.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
]
all = [
    "ark-agentic[dev]",
]

[project.scripts]
insurance-agent = "ark_agentic.agents.insurance.agent:main_sync"
ark-agentic-api = "ark_agentic.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ark_agentic"]
artifacts = ["src/ark_agentic/static/**"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
